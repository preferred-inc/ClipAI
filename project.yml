name: ClipAI
options:
  bundleIdPrefix: com.clipai
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

targets:
  ClipAI:
    type: application
    platform: macOS
    sources:
      - path: ClipAI
        excludes:
          - Info.plist
          - ClipAI.entitlements
    info:
      path: ClipAI/Info.plist
      properties:
        CFBundleName: ClipAI
        CFBundleDisplayName: ClipAI
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: ClipAI/ClipAI.entitlements
      properties:
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipai.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
